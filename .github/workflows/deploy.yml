name: Deploy Bot to AWS

# This tells GitHub to run the pipeline whenever you push to the "main" branch
on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Log into your AWS Account using the Secrets
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1 # Frankfurt

    # 3. Log Docker into AWS ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build the image and push it to the ECR repo
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: linkedin-job-bot
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Tell Lambda to update itself with the new image
    - name: Update Lambda function
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: linkedin-job-bot
        IMAGE_TAG: latest
      run: |
        aws lambda update-function-code \
          --function-name linkedin-job-bot-function \
          --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG